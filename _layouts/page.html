---
layout: default
---
<article class="page">
  {% if page.hero_image %}
  <div class="page__hero">
    <img src="{{ '/assets/images/' | append: page.hero_image | relative_url }}" alt="{{ page.hero_alt | default: page.title }}" loading="lazy">
  </div>
  {% endif %}

  <header class="page__header">
    <h1 class="page__title">{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="page__subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  <div class="page__body">
    {{ content }}
  </div>
</article>
