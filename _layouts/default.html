<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>{{ page.title }} | {{ site.data.property.name }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
</head>
<body>
  {% include sidebar.html %}

  <div class="mobile-header">
    {% if page.url != "/" %}
    <a href="{{ '/' | relative_url }}" class="mobile-header__back" aria-label="Home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    {% endif %}
    <div class="mobile-header__logo">
      {% if page.url == "/" %}
      <svg class="mobile-header__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Kona Trail Cabin</span>
      {% else %}
      <span>{{ page.title }}</span>
      {% endif %}
    </div>
    <div class="mobile-header__weather" id="weather-header"></div>
  </div>

  <main class="content">
    {{ content }}
  </main>

  {% include mobile-nav.html %}
  {% include mobile-menu-overlay.html %}

  <script src="{{ '/assets/js/weather.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/navigation.js' | relative_url }}"></script>
</body>
</html>
