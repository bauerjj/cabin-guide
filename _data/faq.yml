questions:
  - question: "What's the check-in process?"
    answer: "Self check-in with a keypad. Your unique 4-digit code will be sent before arrival. Just punch it in and you're home!"

  - question: "Is there parking?"
    answer: "Yes! Free driveway parking for up to 2 vehicles. Pull all the way forward to leave room."

  - question: "How do I use the hot tub?"
    answer: "The hot tub is always on and ready to use. Just remove the cover, hop in, and replace the cover when you're done. Please shower before entering and no glass near the tub."

  - question: "What's the WiFi password?"
    answer: "Network: KonaTrail-Guest. The password is provided in your booking confirmation message."

  - question: "Is there a grocery store nearby?"
    answer: "The nearest grocery store is in Flagstaff, about 15 minutes north. We recommend stocking up before arriving. There's a Fry's, Safeway, Sprouts, and Natural Grocers."

  - question: "What should I bring?"
    answer: "We provide linens, towels, basic toiletries, and kitchen essentials. Bring your own groceries, swimsuit for the hot tub, and layers — mountain weather changes quickly!"

  - question: "Does it snow in Flagstaff?"
    answer: "Yes! Flagstaff averages over 100 inches of snow per year. Winter visitors should have snow-capable vehicles and be prepared for cold temperatures (often below freezing)."

  - question: "Can I bring my dog?"
    answer: "Sorry, no pets are allowed. Service animals are always welcome."

  - question: "How far is the Grand Canyon?"
    answer: "About 1.5 hours to the South Rim. It makes a perfect day trip! Leave early to beat the crowds."

  - question: "Is there cell service?"
    answer: "Cell service can be spotty in Kachina Village. The cabin has high-speed WiFi, so use WiFi calling if your signal is weak."

  - question: "What's the elevation?"
    answer: "About 7,000 feet. Drink plenty of water, especially if you're coming from lower elevations. Alcohol hits harder at altitude!"

  - question: "Is there a washer and dryer?"
    answer: "Yes! A Samsung front-load washer and dryer is in the bathroom. Detergent pods are provided."
