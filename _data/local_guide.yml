getting_around:
  from_phoenix:
    distance: "~145 miles"
    time: "~2 hours via I-17 North"
    notes: "Beautiful drive through desert to pines. Watch for elk near Flagstaff."
  from_cabin:
    downtown: "~15 minutes"
    sedona: "~45 minutes"
    grand_canyon_south_rim: "~1.5 hours"
    phoenix: "~2 hours"
    meteor_crater: "~45 minutes"
  tips:
    - "4WD or AWD recommended in winter — Kachina Village roads can get icy"
    - "Keep your gas tank at least half full in winter"
    - "Elk and deer are common on roads — drive carefully at dawn and dusk"
    - "I-17 between Flagstaff and Phoenix can close during heavy snow"

things_to_do:
  outdoor:
    - name: "Snowbowl / Arizona Snowbowl"
      description: "Ski resort in winter, scenic chairlift and hiking in summer"
      distance: "~30 min"
      map: "Arizona+Snowbowl,+Flagstaff,+AZ"
      image: "snowbowl.jpg"
    - name: "Walnut Canyon National Monument"
      description: "Ancient cliff dwellings with stunning canyon views"
      distance: "~20 min"
      map: "Walnut+Canyon+National+Monument,+Flagstaff,+AZ"
      image: "walnut-canyon.jpg"
    - name: "Sunset Crater Volcano"
      description: "Volcanic landscape with lava flows and cinder cones"
      distance: "~30 min"
      map: "Sunset+Crater+Volcano+National+Monument,+AZ"
      image: "sunset-crater.jpg"
    - name: "Sedona Red Rocks"
      description: "World-famous red rock formations, hiking, and vortexes"
      distance: "~45 min"
      map: "Sedona,+AZ"
      image: "sedona.jpg"
    - name: "Grand Canyon South Rim"
      description: "One of the seven natural wonders of the world"
      distance: "~1.5 hrs"
      map: "Grand+Canyon+South+Rim+Visitor+Center,+AZ"
      image: "grand-canyon.jpg"
    - name: "Flagstaff Urban Trail System"
      description: "70+ miles of trails through pine forests right in town"
      distance: "~15 min"
      map: "Flagstaff+Urban+Trail+System,+Flagstaff,+AZ"
      image: "flagstaff-trails.jpg"

  in_town:
    - name: "Historic Downtown Flagstaff"
      description: "Route 66 charm with shops, galleries, and restaurants"
      distance: "~15 min"
      map: "Historic+Downtown+Flagstaff,+AZ"
      image: "downtown-flagstaff.jpg"
    - name: "Lowell Observatory"
      description: "Where Pluto was discovered — incredible stargazing programs"
      distance: "~20 min"
      map: "Lowell+Observatory,+Flagstaff,+AZ"
      image: "lowell-observatory.jpg"
    - name: "Museum of Northern Arizona"
      description: "Natural history and Native American art and culture"
      distance: "~20 min"
      map: "Museum+of+Northern+Arizona,+Flagstaff,+AZ"
    - name: "Riordan Mansion State Historic Park"
      description: "Beautiful 1904 Arts & Crafts-style mansion"
      distance: "~15 min"
      map: "Riordan+Mansion+State+Historic+Park,+Flagstaff,+AZ"

places_to_eat:
  breakfast:
    - name: "MartAnne's Burrito Palace"
      description: "Beloved local breakfast spot — try the green chile"
      vibe: "Quirky, colorful, locals' favorite"
      map: "MartAnne's+Burrito+Palace,+Flagstaff,+AZ"
    - name: "Toasted Owl Cafe"
      description: "Creative breakfast and brunch with great coffee"
      vibe: "Hip, cozy, great outdoor patio"
      map: "Toasted+Owl+Cafe,+Flagstaff,+AZ"
      image: "toasted-owl.jpg"
    - name: "Criollo Latin Kitchen"
      description: "Latin-inspired brunch with craft cocktails"
      vibe: "Upscale casual, weekend brunch"
      map: "Criollo+Latin+Kitchen,+Flagstaff,+AZ"

  lunch_dinner:
    - name: "Brix Restaurant & Wine Bar"
      description: "Fine dining with a seasonal, locally-sourced menu"
      vibe: "Date night, special occasion"
      map: "Brix+Restaurant+Wine+Bar,+Flagstaff,+AZ"
      image: "brix.jpg"
    - name: "Coppa Cafe"
      description: "Italian-inspired with housemade pasta"
      vibe: "Cozy, romantic, great wine list"
      map: "Coppa+Cafe,+Flagstaff,+AZ"
    - name: "Diablo Burger"
      description: "Local beef burgers on English muffin buns"
      vibe: "Casual, local favorite"
      map: "Diablo+Burger,+Flagstaff,+AZ"
      image: "diablo-burger.jpg"
    - name: "Pizzicletta"
      description: "Wood-fired Neapolitan pizza — worth the wait"
      vibe: "Intimate, BYOB"
      map: "Pizzicletta,+Flagstaff,+AZ"
      image: "pizzicletta.jpg"
    - name: "Tourist Home All Day Cafe"
      description: "Great coffee and creative sandwiches all day"
      vibe: "Trendy, great for remote work"
      map: "Tourist+Home+All+Day+Cafe,+Flagstaff,+AZ"

  drinks:
    - name: "Mother Road Brewing"
      description: "Flagship Flagstaff brewery with a great taproom"
      vibe: "Laid-back, dog-friendly patio"
      map: "Mother+Road+Brewing+Company,+Flagstaff,+AZ"
    - name: "Dark Sky Brewing"
      description: "Craft beer inspired by Flagstaff's dark sky designation"
      vibe: "Fun atmosphere, live music"
      map: "Dark+Sky+Brewing,+Flagstaff,+AZ"
      image: "dark-sky-brewing.jpg"
    - name: "Wanderlust Brewing"
      description: "Belgian-inspired ales in a cozy setting"
      vibe: "Intimate, great conversation spot"
      map: "Wanderlust+Brewing+Company,+Flagstaff,+AZ"
    - name: "The Annex"
      description: "Cocktail bar downtown with creative seasonal drinks"
      vibe: "Upscale, craft cocktails"
      map: "The+Annex+Cocktail+Lounge,+Flagstaff,+AZ"

places_to_see:
  - name: "Oak Creek Canyon"
    description: "Scenic drive between Flagstaff and Sedona through a stunning red-rock canyon. Stop at Slide Rock State Park for natural rock waterslides in summer."
    distance: "~30 min to start of canyon"
    map: "Oak+Creek+Canyon,+AZ"
    image: "oak-creek.jpg"
  - name: "Wupatki National Monument"
    description: "800-year-old pueblo ruins in a striking red desert landscape. Combine with Sunset Crater for a great loop drive."
    distance: "~35 min"
    map: "Wupatki+National+Monument,+AZ"
    image: "wupatki.jpg"
  - name: "Bearizona Wildlife Park"
    description: "Drive-through wildlife park in Williams with bears, wolves, and bison. Great for all ages."
    distance: "~45 min"
    map: "Bearizona+Wildlife+Park,+Williams,+AZ"
    image: "bearizona.jpg"
  - name: "Montezuma Castle"
    description: "Remarkably well-preserved cliff dwelling built into a limestone cliff. Easy, accessible visit."
    distance: "~1 hr"
    map: "Montezuma+Castle+National+Monument,+AZ"
    image: "montezuma.jpg"
  - name: "Horseshoe Bend"
    description: "Iconic Colorado River overlook near Page. A bucket-list photo op."
    distance: "~2.5 hrs"
    map: "Horseshoe+Bend,+Page,+AZ"
    image: "horseshoe-bend.jpg"
